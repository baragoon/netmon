run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - gosec
    - gosimple
    - govet
    - ineffassign
    - misspell
    - noctx
    - revive
    - rowserrcheck
    - staticcheck
    - typecheck
    - unused

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
