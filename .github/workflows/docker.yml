---
name: Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}


jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next release tag
        id: next-tag
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            let latest = 'v0.0.0';
            try {
              const r = await github.rest.repos.getLatestRelease({ owner, repo });
              latest = r.data.tag_name;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const match = latest.match(/^v(\d+)\.(\d+)\.(\d+)$/);
            if (!match) {
              core.setFailed(`Latest release tag has invalid format: ${latest}`);
              return;
            }

            const major = Number(match[1]);
            const minor = Number(match[2]);
            const patch = Number(match[3]) + 1;
            const next = `v${major}.${minor}.${patch}`;

            core.setOutput('latest', latest);
            core.setOutput('next', next);

      - name: Create and push version tag
        if: github.event_name == 'workflow_dispatch'
        env:
          NEW_TAG: ${{ steps.next-tag.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Creating new tag: $NEW_TAG"

          if git ls-remote --exit-code --tags origin "refs/tags/$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag already exists on origin: $NEW_TAG"
            exit 1
          fi

          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Set release tag output
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ steps.next-tag.outputs.next }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install cosign
        if: github.event_name == 'workflow_dispatch'
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: 'v2.2.4'

      - name: Ensure Docker daemon access
        run: |
          if docker info >/dev/null 2>&1; then
            echo "Docker daemon is already accessible"
            exit 0
          fi

          if command -v sudo >/dev/null 2>&1; then
            sudo chmod 666 /var/run/docker.sock || true
          fi

          docker info

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker-tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "value<<EOF"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release-tag.outputs.value }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "value<<EOF"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64,linux/arm/v7,linux/arm64/v8
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.docker-tags.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Sign the published Docker image
        if: github.event_name == 'workflow_dispatch'
        env:
          TAGS: ${{ steps.docker-tags.outputs.value }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release-tag.outputs.value }}
          release_name: Release ${{ steps.release-tag.outputs.value }}
          body: |
            ## Docker Images
            
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release-tag.outputs.value }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ```
            
            ## Image Details
            - **Digest**: `${{ steps.build-and-push.outputs.digest }}`
            - **Tags**:
            ```
            ${{ steps.docker-tags.outputs.value }}
            ```
          draft: false
          prerelease: false
