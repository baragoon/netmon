version: '3.8'

services:
  netmon:
    build: .
    container_name: netmon
    # Use host network to monitor host connections
    network_mode: "host"
    # Use host PID namespace to see host processes (required for process name lookup)
    pid: "host"
    # Run as root to access network data
    user: "root"
    # Use privileged mode for maximum capabilities
    privileged: true
    # Mount config file and /proc for process lookup
    volumes:
      - ./config.json:/app/config.json:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    # Set environment variables if needed
    environment:
      - TZ=Europe/Kyiv
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
    # Keep container running
    restart: unless-stopped
    # Recommendations based on your monitoring needs:
    # - Change interval: Modify the CMD defaults below
    # - Disable verbose: Remove "--verbose" flag below
    # - Use custom config: Uncomment volumes and add "--config /app/config.json"
    command: ["--interval", "5s", "--alerts-only", "--verbose"]
